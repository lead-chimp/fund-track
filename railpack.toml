[variables]
SKIP_ENV_VALIDATION = "true"
DATABASE_URL = "postgresql://placeholder:placeholder@placeholder:5432/placeholder"
PRISMA_CLI_BINARY_TARGETS = "linux-musl,native"
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["nodejs_20", "npm"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

[phases.start]
cmd = "./scripts/docker-entrypoint.sh npm start"